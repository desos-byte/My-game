<!DOCTYPE html>
<html>
<head>
    <title>welcome!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #edf5f9; }
        canvas { display: block; touch-action: none; }

        /* 弹窗背后的遮罩层 */
        #custom-modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
        }

        /* 弹窗主体样式 */
        /* 弹窗主体样式 */
.modal-content {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    
    /* --- 1. 透明与模糊效果 --- */
    background: rgba(255, 255, 255, 0.7); 
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* --- 2. 形状与比例控制 --- */
    border-radius: 0;           /* 彻底直角 */
    width: 450px;               /* 调大宽度以适应横版 */
    aspect-ratio: 1.41 / 1;     /* 精确横版比例 */
    
    /* --- 3. 字体设置：幼圆体方案 --- */
    /* 优先调用苹果和系统的幼圆/圆体 */
    font-family: "STYuanti-SC-Regular", "Yuanti SC", "YouYuan", "Microsoft YaHei UI", sans-serif;
    
    /* --- 4. 布局 --- */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    text-align: center;
    cursor: move;
    box-sizing: border-box;
}

/* 按钮也同步改为直角，并统一字体 */
.modal-content button {
    border-radius: 0;
    margin: 10px;
    padding: 10px 25px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    font-family: inherit; /* 继承父级的幼圆体 */
}

/* 针对标题微调 */
.modal-content h3 {
    margin-top: 0;
    font-size: 24px;
}

        /* 互动元素恢复普通指针 */
        .interactable { cursor: pointer; }
        .btn-clear { background: #e74c3c; color: white; }
        .btn-cancel { background: #bdc3c7; color: black; }
    </style>
</head>
<body>
    <div id="custom-modal">
        <div class="modal-content" id="modal-body">
            <h3>不要了…</h3>
            <button class="btn-clear interactable" id="confirm-clear">嗯</button>
            <button class="btn-cancel interactable" id="cancel-clear">我也要删吗</button>
        </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Body, Events } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#edf5f9'
            }
        });

        // 墙壁
        const wallThickness = 60;
        const wallOptions = { isStatic: true, render: { fillStyle: '#edf5f9' } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + wallThickness / 2, window.innerWidth, wallThickness, wallOptions);
        const ceiling = Bodies.rectangle(window.innerWidth / 2, -wallThickness / 2, window.innerWidth, wallThickness, wallOptions);
        const leftWall = Bodies.rectangle(-wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, wallOptions);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });

        Composite.add(engine.world, [ground, ceiling, leftWall, rightWall, mouseConstraint]);

        // 点击生成逻辑
        Events.on(mouseConstraint, 'mousedown', function(event) {
            const mousePosition = event.mouse.position;
            setTimeout(() => {
                if (!mouseConstraint.body) {
                    const size = 40 + Math.random() * 40;
                    const newBox = Bodies.rectangle(mousePosition.x, mousePosition.y, size, size, {
                        render: { fillStyle: '#' + Math.floor(Math.random() * 16777215).toString(16) }
                    });
                    Composite.add(engine.world, newBox);
                }
            }, 10);
        });

        // 初始方块
        const box1 = Bodies.rectangle(window.innerWidth / 2 - 100, 100, 80, 80, { render: { fillStyle: '#e74c3c' } });
        const box2 = Bodies.rectangle(window.innerWidth / 2, 50, 80, 80, { render: { fillStyle: '#2ecc71' } });
        const box3 = Bodies.rectangle(window.innerWidth / 2 + 100, 0, 80, 80, { render: { fillStyle: '#3498db' } });
        Composite.add(engine.world, [box1, box2, box3]);

        Render.run(render);
        Runner.run(Runner.create(), engine);
        render.mouse = mouse;

        // --- 长按弹出逻辑 ---
        let pressTimer;
        const modal = document.getElementById('custom-modal');

        const startPress = () => { pressTimer = setTimeout(() => { modal.style.display = 'block'; }, 1000); };
        const endPress = () => { clearTimeout(pressTimer); };

        render.canvas.addEventListener('mousedown', startPress);
        render.canvas.addEventListener('touchstart', startPress);
        window.addEventListener('mouseup', endPress);
        window.addEventListener('touchend', endPress);

        // --- 拖拽弹窗逻辑 ---
        const modalBody = document.getElementById('modal-body');
        let isDragging = false, offsetX, offsetY;

        const moveStart = (e) => {
            if (e.target.classList.contains('interactable')) return;
            isDragging = true;
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            const rect = modalBody.getBoundingClientRect();
            offsetX = clientX - rect.left;
            offsetY = clientY - rect.top;
            modalBody.style.transform = 'none';
            modalBody.style.left = rect.left + 'px';
            modalBody.style.top = rect.top + 'px';
        };

        const moveAction = (e) => {
            if (!isDragging) return;
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            modalBody.style.left = (clientX - offsetX) + 'px';
            modalBody.style.top = (clientY - offsetY) + 'px';
        };

        modalBody.addEventListener('mousedown', moveStart);
        modalBody.addEventListener('touchstart', moveStart);
        window.addEventListener('mousemove', moveAction);
        window.addEventListener('touchmove', moveAction, { passive: false });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('touchend', () => isDragging = false);

        // --- 按钮功能 ---
        document.getElementById('confirm-clear').onclick = () => {
            const bodies = Composite.allBodies(engine.world);
            bodies.forEach(b => { if (!b.isStatic) Composite.remove(engine.world, b); });
            modal.style.display = 'none';
        };
        document.getElementById('cancel-clear').onclick = () => { modal.style.display = 'none'; };

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + wallThickness / 2 });
            Body.setPosition(ceiling, { x: window.innerWidth / 2, y: -wallThickness / 2 });
            Body.setPosition(leftWall, { x: -wallThickness / 2, y: window.innerHeight / 2 });
            Body.setPosition(rightWall, { x: window.innerWidth + wallThickness / 2, y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>
