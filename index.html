<!DOCTYPE html>
<html>
<head>
    <title>welcome!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #edf5f9; }
        canvas { display: block; touch-action: none; }

        /* 动态漂浮文字样式 */
        .floating-text {
            position: fixed;
            top: 40px;
            left: -200px;
            /* 字体设置：等线、轻细、66ccff */
            font-family: "DengXian", "DengXian Light", "Microsoft YaHei Light", sans-serif;
            font-size: 26px;
            font-weight: 300;
            color: #66ccff;
            letter-spacing: 3px;
            
            /* 关键：允许鼠标穿透，这样文字不会挡住你拖拽方块 */
            pointer-events: none; 
            
            z-index: 10000;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .floating-text.show {
            left: 40px;
            opacity: 1;
        }
    </style>
</head>
<body>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Body, Events } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#edf5f9'
            }
        });

        // 墙壁
        const wallThickness = 60;
        const wallOptions = { isStatic: true, render: { fillStyle: '#edf5f9' } };
        const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + wallThickness / 2, window.innerWidth, wallThickness, wallOptions);
        const ceiling = Bodies.rectangle(window.innerWidth / 2, -wallThickness / 2, window.innerWidth, wallThickness, wallOptions);
        const leftWall = Bodies.rectangle(-wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth + wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, wallOptions);

        // 鼠标与拖拽逻辑 (保留)
        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.2,
                render: { visible: false }
            }
        });

        Composite.add(engine.world, [ground, ceiling, leftWall, rightWall, mouseConstraint]);

        // 点击生成方块
        Events.on(mouseConstraint, 'mousedown', function(event) {
            const mousePosition = event.mouse.position;
            setTimeout(() => {
                // 如果鼠标没有抓到现有的物体，才生成新方块
                if (!mouseConstraint.body) {
                    const size = 40 + Math.random() * 40;
                    const newBox = Bodies.rectangle(mousePosition.x, mousePosition.y, size, size, {
                        render: { fillStyle: '#' + Math.floor(Math.random() * 16777215).toString(16) }
                    });
                    Composite.add(engine.world, newBox);
                }
            }, 10);
        });

        // 初始方块
        const box1 = Bodies.rectangle(window.innerWidth / 2 - 100, 100, 80, 80, { render: { fillStyle: '#e74c3c' } });
        const box2 = Bodies.rectangle(window.innerWidth / 2, 50, 80, 80, { render: { fillStyle: '#2ecc71' } });
        const box3 = Bodies.rectangle(window.innerWidth / 2 + 100, 0, 80, 80, { render: { fillStyle: '#3498db' } });
        Composite.add(engine.world, [box1, box2, box3]);

        Render.run(render);
        Runner.run(Runner.create(), engine);
        render.mouse = mouse;

        // --- 核心逻辑：定时清屏与文字 ---

        setTimeout(() => {
            const textNode = document.createElement('div');
            textNode.className = 'floating-text';
            textNode.innerText = '不要了…';
            document.body.appendChild(textNode);
            requestAnimationFrame(() => textNode.classList.add('show'));
        }, 1200);

        setTimeout(() => {
            // 清除方块
            const allBodies = Composite.allBodies(engine.world);
            allBodies.forEach(body => {
                if (!body.isStatic) Composite.remove(engine.world, body);
            });

            // 文字消失
            const textNode = document.querySelector('.floating-text');
            if (textNode) {
                textNode.style.opacity = '0';
                textNode.style.transform = 'translateX(-20px)';
                setTimeout(() => textNode.remove(), 800);
            }
        }, 3500);

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + wallThickness / 2 });
            Body.setPosition(ceiling, { x: window.innerWidth / 2, y: -wallThickness / 2 });
            Body.setPosition(leftWall, { x: -wallThickness / 2, y: window.innerHeight / 2 });
            Body.setPosition(rightWall, { x: window.innerWidth + wallThickness / 2, y: window.innerHeight / 2 });
        });
    </script>
</body>
</html>
