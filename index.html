<!DOCTYPE html>
<html>
<head>
    <title>welcome!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #edf5f9; }
        canvas { 
            display: block; 
            touch-action: none; 
            image-rendering: high-quality;
        }

        /* 你的长按悬浮文字原版样式 */
        .floating-text {
            position: fixed;
            top: 40px;
            left: -200px;
            font-family: "Yuanti SC", "YouYuan", sans-serif;
            font-weight: 200;
            color: #66ccff;
            font-size: 24px;
            letter-spacing: -0.8px;
            line-height: 0.8;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }
        .floating-text.show { left: 45px; opacity: 1; }
        .floating-text.exit {
            opacity: 0;
            top: 15px;
            transform: scale(1.1) translateY(-10px);
            filter: blur(6px);
            transition: all 0.8s ease-out;
        }

        /* --- 新增：AI 聊天相关样式 --- */
        .text-base {
            font-family: "Yuanti SC", "YouYuan", sans-serif;
            font-weight: 200;
            color: #66ccff;
            letter-spacing: -0.8px;
            line-height: 1.1;
            /* 改为 auto 以便响应点击 */
            pointer-events: auto; 
            position: fixed;
            left: 45px;
            z-index: 10000;
            cursor: pointer; /* 鼠标悬停显示手型提示可点击 */
        }
        #chat-container {
            position: fixed;
            top: 20px;
            left: 40px;
            z-index: 10001;
        }
        #user-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(102, 204, 255, 0.2);
            color: #66ccff;
            font-family: inherit;
            font-weight: 100;
            font-size: 16px;
            outline: none;
            width: 220px;
            padding: 5px 0;
            pointer-events: auto;
        }
        #user-input::placeholder { color: rgba(102, 204, 255, 0.3); }

        #ai-response {
            top: 105px; 
            font-size: 17px;
            max-width: 280px;
            opacity: 0;
            transition: opacity 0.5s ease;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div id="chat-container">
        <input type="text" id="user-input" placeholder="和 Gemini 聊聊..." autocomplete="off">
    </div>
    <div id="ai-response" class="text-base"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Body, Events } = Matter;

        const TEXTURE_SOURCES = [
            'https://files.catbox.moe/wq99z2.png',
            'https://files.catbox.moe/p9o75t.png'
        ];
        const TARGET_SIZE = 85; 

        const loadedImages = [];
        TEXTURE_SOURCES.forEach(url => {
            const img = new Image();
            img.src = url;
            img.onload = () => loadedImages.push(img);
        });

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false,
                background: '#edf5f9',
                pixelRatio: window.devicePixelRatio || 1
            }
        });

        const wallOptions = { isStatic: true, render: { visible: false } };
        Composite.add(engine.world, [
            Bodies.rectangle(window.innerWidth/2, window.innerHeight+30, window.innerWidth, 60, wallOptions),
            Bodies.rectangle(window.innerWidth/2, -30, window.innerWidth, 60, wallOptions),
            Bodies.rectangle(-30, window.innerHeight/2, 60, window.innerHeight, wallOptions),
            Bodies.rectangle(window.innerWidth+30, window.innerHeight/2, 60, window.innerHeight, wallOptions)
        ]);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });
        Composite.add(engine.world, mouseConstraint);

        Events.on(mouseConstraint, 'mousedown', (event) => {
            if (!mouseConstraint.body && loadedImages.length > 0) {
                const randomImg = loadedImages[Math.floor(Math.random() * loadedImages.length)];
                const radius = TARGET_SIZE / 2;
                const scaleX = TARGET_SIZE / randomImg.width;
                const scaleY = TARGET_SIZE / randomImg.height;

                const circleAvatar = Bodies.circle(event.mouse.position.x, event.mouse.position.y, radius, {
                    restitution: 0.5,
                    render: {
                        sprite: {
                            texture: randomImg.src,
                            xScale: scaleX,
                            yScale: scaleY
                        }
                    }
                });
                Composite.add(engine.world, circleAvatar);
            }
        });

        let pressTimer, timers = [], currentTextNode = null, startPos = { x: 0, y: 0 };

        Events.on(mouseConstraint, 'mousedown', (event) => {
            startPos = { x: event.mouse.position.x, y: event.mouse.position.y };
            pressTimer = setTimeout(() => startSequence(), 1000);
        });

        Events.on(mouseConstraint, 'mousemove', (event) => {
            if (Math.abs(event.mouse.position.x - startPos.x) > 2 || Math.abs(event.mouse.position.y - startPos.y) > 2) cancelEverything();
        });

        Events.on(mouseConstraint, 'mouseup', () => cancelEverything());

        function startSequence() {
            const t1 = setTimeout(() => {
                if (!currentTextNode) {
                    currentTextNode = document.createElement('div');
                    currentTextNode.className = 'floating-text';
                    currentTextNode.innerText = '不要了…';
                    document.body.appendChild(currentTextNode);
                    requestAnimationFrame(() => currentTextNode.classList.add('show'));
                }
            }, 120);

            const t2 = setTimeout(() => {
                clearWithAnimation();
                if (currentTextNode) currentTextNode.classList.add('exit');
                setTimeout(() => { if(currentTextNode) currentTextNode.remove(); currentTextNode = null; }, 800);
            }, 3620);
            timers.push(t1, t2);
        }

        function cancelEverything() {
            clearTimeout(pressTimer);
            timers.forEach(t => clearTimeout(t));
            timers = [];
            if (currentTextNode) {
                currentTextNode.style.left = '-100px';
                currentTextNode.style.opacity = '0';
                const temp = currentTextNode;
                setTimeout(() => temp.remove(), 600);
                currentTextNode = null;
            }
        }

        function clearWithAnimation() {
            Composite.allBodies(engine.world).filter(b => !b.isStatic).forEach(body => {
                body.collisionFilter.mask = 0;
                Body.setAngularVelocity(body, (Math.random()-0.5)*0.2);
                let s = 1.0;
                const anim = setInterval(() => {
                    s -= 0.05;
                    if (s <= 0) { Composite.remove(engine.world, body); clearInterval(anim); }
                    else { Body.scale(body, 0.9, 0.9); body.render.opacity = s; }
                }, 16);
            });
        }

        // --- AI 聊天逻辑修改部分 ---
        const userInput = document.getElementById('user-input');
        const aiResponse = document.getElementById('ai-response');

        // 新增：点击 AI 回复框时隐藏
        aiResponse.addEventListener('click', () => {
            aiResponse.style.opacity = "0";
            // 等动画结束后清空文字，防止干扰下次显示
            setTimeout(() => { aiResponse.innerText = ""; }, 500);
        });

        userInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter' && userInput.value.trim() !== "") {
                const prompt = userInput.value;
                userInput.value = "";
                userInput.placeholder = "思考中...";
                
                try {
                    const targetUrl = `${window.location.origin}/chat?prompt=${encodeURIComponent(prompt)}`;
                    const res = await fetch(targetUrl, { method: "GET", cache: "no-cache" });
                    const data = await res.json();
                    
                    if (data.error) {
                        const errorMsg = typeof data.error === 'object' ? (data.error.message || JSON.stringify(data.error)) : data.error;
                        throw new Error(errorMsg);
                    }

                    if (!data.candidates || !data.candidates[0].content) {
                        throw new Error("模型未返回有效内容");
                    }

                    const text = data.candidates[0].content.parts[0].text;
                    aiResponse.innerText = text;
                    aiResponse.style.opacity = "1";
                    
                    // 移除原来的 15 秒定时器，现在改为点击消失
                } catch (err) {
                    console.error("请求失败:", err);
                    aiResponse.innerText = "状态: " + err.message;
                    aiResponse.style.opacity = "1";
                }
                userInput.placeholder = "和 Gemini 聊聊...";
            }
        });

        Render.run(render);
        Runner.run(Runner.create(), engine);
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
