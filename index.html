<!DOCTYPE html>
<html>
<head>
    <title>welcome!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #edf5f9; }
        /* 确保 Canvas 在移动端也全屏且不响应系统缩放 */
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>
    <!-- 引入最新的 Matter.js 库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        // 1. 解构必要的模块（包括 Mouse 和 MouseConstraint）
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Body, Query } = Matter;

        // 2. 初始化引擎和渲染器
        const engine = Engine.create();
        
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: {
                width: window.innerWidth,
                height: window.innerHeight,
                wireframes: false, // 设置为 false 才能看到实心方块，而不是线框
                background: '#edf5f9'
            }
        });

        // --- 【新增：拖拽核心代码】 ---
        
        // A. 创建鼠标实例（告诉引擎 Canvas 的哪个位置对应鼠标）
        const mouse = Mouse.create(render.canvas);

        // B. 创建鼠标约束（给物理引擎增加“抓取”功能）
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: {
                stiffness: 0.1, // 抓取的刚度，0.1 更“跟手”
                render: {
                    visible: false // 不显示拖动时的连接线
                }
            }
        });

        // C. 将鼠标约束添加到物理世界
        Composite.add(engine.world, mouseConstraint);

        // D. 这一步至关重要：保持鼠标与渲染同步
        render.mouse = mouse;

        // --- 【结束拖拽代码】 ---

        // 3. 创建纯色物体（无需贴图）
        
        // 创建三个方块，分别设置不同的颜色
        const box1 = Bodies.rectangle(window.innerWidth / 2 - 100, 100, 80, 80, {
            render: { fillStyle: '#e74c3c' } // 红色
        });
        const box2 = Bodies.rectangle(window.innerWidth / 2, 50, 80, 80, {
            render: { fillStyle: '#2ecc71' } // 绿色
        });
        const box3 = Bodies.rectangle(window.innerWidth / 2 + 100, 0, 80, 80, {
            render: { fillStyle: '#3498db' } // 蓝色
        });

        // 设置墙壁的厚度
const wallThickness = 60; 

// 1. 地面 (底部)
const ground = Bodies.rectangle(window.innerWidth / 2, window.innerHeight + wallThickness / 2, window.innerWidth, wallThickness, { isStatic: true });

// 2. 天花板 (顶部)
const ceiling = Bodies.rectangle(window.innerWidth / 2, -wallThickness / 2, window.innerWidth, wallThickness, { isStatic: true });

// 3. 左侧墙
const leftWall = Bodies.rectangle(-wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, { isStatic: true });

// 4. 右侧墙
const rightWall = Bodies.rectangle(window.innerWidth + wallThickness / 2, window.innerHeight / 2, wallThickness, window.innerHeight, { isStatic: true });

// 将四面墙全部添加到世界中
Composite.add(engine.world, [ground, ceiling, leftWall, rightWall]);

        // 4. 将物体添加到物理世界
        Composite.add(engine.world, [box1, box2, box3, ground]);

        // 监听鼠标点击/触摸事件
        // 2. 使用原生监听，但增加物理检测
render.canvas.addEventListener('mousedown', (event) => {
    // 将鼠标点击的屏幕坐标转换为当前画布的坐标
    const mousePosition = {
        x: event.clientX,
        y: event.clientY
    };

    // 【关键】检查点击的位置是否有任何物理身体（除了地面和墙）
    // 这里的 engine.world.bodies 是所有的物体列表
    const bodiesUnderMouse = Query.point(engine.world.bodies, mousePosition);

    // 过滤掉地面和墙（如果有的话），或者简单判断：如果点的不是任何东西
    // 只有当点击的位置没有任何物体时，才创建新方块
    if (bodiesUnderMouse.length === 0) {
        const size = 40 + Math.random() * 40;
        const newBox = Bodies.rectangle(mousePosition.x, mousePosition.y, size, size, {
            render: {
                fillStyle: '#' + Math.floor(Math.random()*16777215).toString(16)
            }
        });
        Composite.add(engine.world, newBox);
    }
});
        
// 为了兼容手机触摸，添加 touchstart 监听
render.canvas.addEventListener('touchstart', (event) => {
    if (!mouseConstraint.body) {
        const touch = event.touches[0];
        const newBox = Bodies.rectangle(touch.clientX, touch.clientY, 50, 50, {
            render: { fillStyle: '#ffcc00' }
        });
        Composite.add(engine.world, newBox);
    }
});

        // 5. 运行引擎和渲染器
        Render.run(render);
        const runner = Runner.create();
        Runner.run(runner, engine);

        // 窗口大小调整时自动适配
        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
            
            // 同时更新地面的位置
            Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });

        window.addEventListener('resize', () => {
    // 更新渲染器大小
    render.canvas.width = window.innerWidth;
    render.canvas.height = window.innerHeight;

    // 更新四面墙的位置，确保它们依然紧贴边缘
    const { Body } = Matter;
    Body.setPosition(ground, { x: window.innerWidth / 2, y: window.innerHeight + wallThickness / 2 });
    Body.setPosition(ceiling, { x: window.innerWidth / 2, y: -wallThickness / 2 });
    Body.setPosition(leftWall, { x: -wallThickness / 2, y: window.innerHeight / 2 });
    Body.setPosition(rightWall, { x: window.innerWidth + wallThickness / 2, y: window.innerHeight / 2 });
});
    </script>
</body>
</html>
