<!DOCTYPE html>
<html>
<head>
    <title>welcome!</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #edf5f9; }
        canvas { display: block; touch-action: none; }

        .floating-text {
            position: fixed;
            top: 40px;
            left: -200px;
            font-family: "Hiragino Maru Gothic ProN", "STYuanti-SC-Light", "YouYuan", sans-serif;
            font-weight: 100;
            color: #66ccff;
            font-size: 24px;
            letter-spacing: -0.8px;
            line-height: 0.8;
            pointer-events: none;
            z-index: 10000;
            opacity: 0;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease;
        }

        .floating-text.show { left: 45px; opacity: 1; }

        .floating-text.exit {
            opacity: 0;
            top: 15px;
            transform: scale(1.1) translateY(-10px);
            filter: blur(6px);
            transition: all 0.8s ease-out;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Render, Runner, Bodies, Composite, Mouse, MouseConstraint, Body, Events } = Matter;

        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#edf5f9' }
        });

        const wallOptions = { isStatic: true, render: { visible: false } };
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight+30, window.innerWidth, 60, wallOptions);
        const ceiling = Bodies.rectangle(window.innerWidth/2, -30, window.innerWidth, 60, wallOptions);
        const leftWall = Bodies.rectangle(-30, window.innerHeight/2, 60, window.innerHeight, wallOptions);
        const rightWall = Bodies.rectangle(window.innerWidth+30, window.innerHeight/2, 60, window.innerHeight, wallOptions);

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.2, render: { visible: false } }
        });

        Composite.add(engine.world, [ground, ceiling, leftWall, rightWall, mouseConstraint]);

        // --- 配置区 ---
        const TEXTURE_URL = 'https://files.catbox.moe/wq99z2.png';
        const TARGET_SIZE = 80; 
        const IMG_ORIGIN = 1024; 

        Events.on(mouseConstraint, 'mousedown', (event) => {
            if (!mouseConstraint.body) {
                // 使用圆形碰撞箱
                const radius = TARGET_SIZE / 2;
                const circleAvatar = Bodies.circle(event.mouse.position.x, event.mouse.position.y, radius, {
                    restitution: 0.6,
                    friction: 0.1,
                    render: {
                        sprite: {
                            texture: TEXTURE_URL,
                            xScale: TARGET_SIZE / IMG_ORIGIN,
                            yScale: TARGET_SIZE / IMG_ORIGIN
                        }
                    }
                });
                Composite.add(engine.world, circleAvatar);
            }
        });

        // --- 长按检测与动画逻辑 ---
        let pressTimer, timers = [], currentTextNode = null, startPos = { x: 0, y: 0 };

        Events.on(mouseConstraint, 'mousedown', (event) => {
            startPos = { x: event.mouse.position.x, y: event.mouse.position.y };
            pressTimer = setTimeout(() => startSequence(), 1000);
        });

        Events.on(mouseConstraint, 'mousemove', (event) => {
            if (Math.abs(event.mouse.position.x - startPos.x) > 2 || Math.abs(event.mouse.position.y - startPos.y) > 2) cancelEverything();
        });

        Events.on(mouseConstraint, 'mouseup', () => cancelEverything());

        function startSequence() {
            const t1 = setTimeout(() => {
                if (!currentTextNode) {
                    currentTextNode = document.createElement('div');
                    currentTextNode.className = 'floating-text';
                    currentTextNode.innerText = '不要了…';
                    document.body.appendChild(currentTextNode);
                    requestAnimationFrame(() => currentTextNode.classList.add('show'));
                }
            }, 120);

            const t2 = setTimeout(() => {
                clearWithAnimation();
                if (currentTextNode) currentTextNode.classList.add('exit');
                setTimeout(() => { if(currentTextNode) currentTextNode.remove(); currentTextNode = null; }, 800);
            }, 3620);
            timers.push(t1, t2);
        }

        function cancelEverything() {
            clearTimeout(pressTimer);
            timers.forEach(t => clearTimeout(t));
            timers = [];
            if (currentTextNode) {
                currentTextNode.style.left = '-100px';
                currentTextNode.style.opacity = '0';
                const temp = currentTextNode;
                setTimeout(() => temp.remove(), 600);
                currentTextNode = null;
            }
        }

        function clearWithAnimation() {
            Composite.allBodies(engine.world).filter(b => !b.isStatic).forEach(body => {
                body.collisionFilter.mask = 0;
                Body.setAngularVelocity(body, (Math.random()-0.5)*0.2);
                let s = 1.0;
                const anim = setInterval(() => {
                    s -= 0.05;
                    if (s <= 0) { Composite.remove(engine.world, body); clearInterval(anim); }
                    else { Body.scale(body, 0.9, 0.9); body.render.opacity = s; }
                }, 16);
            });
        }

        Render.run(render);
        Runner.run(Runner.create(), engine);

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth;
            render.canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
